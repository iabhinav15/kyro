<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="120" y1="120" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>

    <linearGradient id="pinkGradient" x1="250" y1="280" x2="400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Left vertical shard -->
  <polygon
    points="140,150 240,120 140,360"
    fill="url(#blueGradient)"
  />

  <!-- Main diagonal shard -->
  <polygon
    points="140,300 270,150 420,110 240,340"
    fill="url(#blueGradient)"
  />

  <!-- Bottom pink shard -->
  <polygon
    points="260,310 410,420 300,380 220,300"
    fill="url(#pinkGradient)"
  />
</svg>